<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sandwich Dodge</title>
<style>
  body { margin: 0; background: #222; color: white; font-family: Arial, sans-serif; text-align: center; }
  canvas { background: #333; display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>🥪 Sandwich Dodge 🗑️ + Toppings 🍅🥬🧀🥩</h1>
<p>Use ← → to move. Collect toppings, dodge trash cans!</p>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const lanes = 5;
const laneWidth = canvas.width / lanes;

let player = { lane: 2, y: canvas.height - 80, size: 40 };
let obstacles = [];
let toppings = [];
let speed = 3;
let score = 0;
let gameOver = false;

// ✅ Fixed key listener
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft" && player.lane > 0) { player.lane--; e.preventDefault(); }
  if (e.key === "ArrowRight" && player.lane < lanes - 1) { player.lane++; e.preventDefault(); }
});

// Spawn obstacles
function spawnObstacle() {
  const lane = Math.floor(Math.random() * lanes);
  obstacles.push({ lane, y: -50, size: 40 });
}

// Spawn toppings
function spawnTopping() {
  const lane = Math.floor(Math.random() * lanes);
  const types = ["🍅","🥬","🧀"];
  const type = Math.random() < 0.10 ? "🥩" : types[Math.floor(Math.random() * types.length)];
  toppings.push({ lane, y: -50, size: 40, type });
}

// Draw everything
function drawPlayer() { ctx.font="30px Arial"; ctx.textAlign="center"; ctx.fillText("🥪", player.lane*laneWidth+laneWidth/2, player.y); }
function drawObstacles() { ctx.font="30px Arial"; ctx.textAlign="center"; obstacles.forEach(o=>ctx.fillText("🗑️", o.lane*laneWidth+laneWidth/2,o.y)); }
function drawToppings() { ctx.font="30px Arial"; ctx.textAlign="center"; toppings.forEach(t=>ctx.fillText(t.type,t.lane*laneWidth+laneWidth/2,t.y)); }
function drawLanes() { ctx.strokeStyle="#555"; for(let i=1;i<lanes;i++){ ctx.beginPath(); ctx.moveTo(i*laneWidth,0); ctx.lineTo(i*laneWidth,canvas.height); ctx.stroke(); }}

// Update obstacles/toppings
function updateObstacles(){ obstacles.forEach(o=>{o.y+=speed; if(o.lane===player.lane && o.y>player.y-20 && o.y<player.y+20) gameOver=true;}); obstacles=obstacles.filter(o=>o.y<canvas.height+50);}
function updateToppings(){ toppings.forEach((t,i)=>{t.y+=speed; if(t.lane===player.lane && t.y>player.y-20 && t.y<player.y+20){ score+=(t.type==="🥩")?50:10; toppings.splice(i,1); }}); toppings=toppings.filter(t=>t.y<canvas.height+50);}

// Main loop
function gameLoop(){
  if(gameOver){ ctx.fillStyle="white"; ctx.font="40px Arial"; ctx.fillText("Game Over!", canvas.width/2, canvas.height/2); ctx.font="20px Arial"; ctx.fillText("Score: "+score, canvas.width/2, canvas.height/2+40); return;}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawLanes(); drawPlayer(); drawObstacles(); drawToppings();
  updateObstacles(); updateToppings();
  score++; ctx.fillText("Score: "+score,70,30);
  requestAnimationFrame(gameLoop);
}

// Spawn intervals
setInterval(spawnObstacle,1000);
setInterval(spawnTopping,1000);

// Start
gameLoop();
</script>
</body>
</html>
