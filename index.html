<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sandwich Move Test</title>
<style>
  canvas { background: #333; display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>🥪 Move the Sandwich</h1>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const lanes = 5;
const laneWidth = canvas.width / lanes;

let player = { lane: 2, y: canvas.height - 80 };

// ✅ Arrow key listener on window (works immediately)
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft" && player.lane > 0) player.lane--;
  if (e.key === "ArrowRight" && player.lane < lanes - 1) player.lane++;
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.fillText("🥪", player.lane * laneWidth + laneWidth / 2, player.y);
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
